name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject Power Automate URL
        env:
          PA_URL: ${{ secrets.POWER_AUTOMATE_FLOW_URL }}
        run: |
          python3 -c "
          import os
          url = os.environ['PA_URL']
          with open('js/main.js', 'r') as f:
              content = f.read()
          content = content.replace('__POWER_AUTOMATE_FLOW_URL__', url)
          with open('js/main.js', 'w') as f:
              f.write(content)
          print('Injected PA URL successfully.')
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
